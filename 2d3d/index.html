<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6d5efc">
<title>Boomsweep — Minesweeper</title>
<style>
  /* AURORA (light) — vivid indigo / violet */
  :root {
    --bg:#eef0ff; --bg2:#f7eeff; --panel:#ffffff; --ink:#26244a; --muted:#8b8db0;
    --line:#e7e6fb; --accent:#6d5efc; --accent2:#8b5cf6; --accent-soft:#ebe8ff;
    --covered:#dcd9fb; --covered-hi:#efedff; --revealed:#faf9ff; --flag:#ff4d79;
    --shadow:0 12px 34px rgba(90,80,200,.18);
    --n1:#5b5bf0; --n2:#11b886; --n3:#ff4d6d; --n4:#a855f7;
    --n5:#f59e0b; --n6:#06b6d4; --n7:#4b4b6b; --n8:#9aa1c5;
  }
  /* NEON (dark) — electric blue / magenta on near-black */
  [data-theme="dark"] {
    --bg:#0c0f1f; --bg2:#15102b; --panel:#181c30; --ink:#eef0ff; --muted:#8b93b8;
    --line:#272c47; --accent:#7c83ff; --accent2:#c45cff; --accent-soft:#23264a;
    --covered:#262c48; --covered-hi:#323a60; --revealed:#13172a; --flag:#ff5d8f;
    --shadow:0 14px 36px rgba(0,0,0,.55);
    --n1:#7c9bff; --n2:#3ee0a3; --n3:#ff7a9c; --n4:#c98bff;
    --n5:#ffb454; --n6:#3ad8e0; --n7:#cfd4f0; --n8:#9aa1c5;
  }
  /* OCEAN (mint) — vivid teal / cyan */
  [data-theme="mint"] {
    --bg:#e6fbfb; --bg2:#e8f6ff; --panel:#ffffff; --ink:#0f3a44; --muted:#5f9099;
    --line:#cdeef0; --accent:#06b6d4; --accent2:#14b8a6; --accent-soft:#cdf3f7;
    --covered:#c4eef0; --covered-hi:#e0f8f9; --revealed:#f2fdfd; --flag:#ff5d7a;
    --shadow:0 12px 34px rgba(10,120,140,.20);
    --n1:#0e9bd6; --n2:#0fb886; --n3:#ff5d6c; --n4:#8b5cf6;
    --n5:#f59e0b; --n6:#06b6d4; --n7:#1f5560; --n8:#7fa8af;
  }
  /* CANDY (sunset) — vivid pink / coral / orange */
  [data-theme="sunset"] {
    --bg:#fde9f3; --bg2:#fff0e6; --panel:#fffafc; --ink:#4a1f3a; --muted:#b07f9c;
    --line:#f7dbe8; --accent:#ec4899; --accent2:#fb7185; --accent-soft:#ffe1ef;
    --covered:#f8d3e4; --covered-hi:#fde7f1; --revealed:#fff6fb; --flag:#f43f5e;
    --shadow:0 12px 34px rgba(190,60,120,.20);
    --n1:#e0397e; --n2:#10b981; --n3:#ff5d6c; --n4:#a855f7;
    --n5:#f97316; --n6:#06b6d4; --n7:#6a2b51; --n8:#c79ab2;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; color: var(--ink);
    background: var(--bg);
    background-image: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
    background-attachment: fixed;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased; transition: background .25s ease, color .25s ease;
  }
  .wrap {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: calc(env(safe-area-inset-top) + 18px) 16px calc(env(safe-area-inset-bottom) + 28px);
    gap: 16px; max-width: 720px; margin: 0 auto;
  }
  header { width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  h1 { font-size: 22px; font-weight: 800; letter-spacing: -.02em; margin: 0; display:flex; align-items:center; gap:9px; }
  h1 .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--flag); box-shadow: 0 0 0 4px var(--accent-soft); }
  .theme-btn { border:1px solid var(--line); background:var(--panel); color:var(--ink); cursor:pointer;
    width:42px; height:42px; border-radius:12px; font-size:18px; transition:all .15s ease; }
  .theme-btn:hover { background: var(--accent-soft); }

  .tabs { display:flex; gap:4px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:4px; width:100%; }
  .tabs button { flex:1; border:none; background:transparent; color:var(--muted); font:inherit; font-weight:700;
    font-size:14px; padding:10px; border-radius:10px; cursor:pointer; transition:all .15s ease; }
  .tabs button.active { background:var(--accent-soft); color:var(--accent); }

  .view { width:100%; display:none; flex-direction:column; align-items:center; gap:14px; }
  .view.active { display:flex; }

  .controls { display:flex; flex-wrap:wrap; align-items:center; gap:8px; justify-content:center; }
  .seg { display:inline-flex; background:var(--panel); border-radius:12px; padding:4px; border:1px solid var(--line); flex-wrap:wrap; justify-content:center; }
  .seg button { border:none; background:transparent; color:var(--muted); font:inherit; font-weight:600; font-size:13px;
    padding:8px 13px; border-radius:9px; cursor:pointer; transition:all .15s ease; }
  .seg button.active { background:var(--accent-soft); color:var(--accent); }
  .seg button:hover:not(.active){ color:var(--ink); }
  .sound-btn { border:1px solid var(--line); background:var(--panel); color:var(--ink); font:inherit; font-weight:600;
    font-size:13px; cursor:pointer; padding:8px 13px; border-radius:12px; transition:all .15s ease; }
  .sound-btn:hover { background:var(--accent-soft); }

  .custom-panel { display:none; align-items:flex-end; justify-content:center; flex-wrap:wrap; gap:10px; }
  .custom-panel.show { display:flex; }
  .field { display:flex; flex-direction:column; gap:3px; }
  .field label { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
  .field input { width:70px; font:inherit; font-weight:600; text-align:center; padding:7px 8px; border-radius:10px;
    border:1px solid var(--line); background:var(--bg); color:var(--ink); -moz-appearance:textfield; }
  .field input:focus { outline:none; border-color:var(--accent); background:var(--panel); }
  .apply-btn { border:none; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font:inherit; font-weight:700; font-size:14px;
    padding:9px 18px; border-radius:11px; cursor:pointer; box-shadow:0 6px 16px rgba(109,94,252,.35); }

  .card { background:var(--panel); border-radius:18px; box-shadow:var(--shadow); border:1px solid var(--line); padding:16px; }
  .hud { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
  .stat { display:flex; align-items:center; gap:8px; background:var(--bg); border:1px solid var(--line); padding:8px 14px;
    border-radius:12px; font-variant-numeric:tabular-nums; font-weight:700; font-size:18px; min-width:90px; justify-content:center; }
  .reset { border:none; cursor:pointer; font-size:26px; line-height:1; width:52px; height:52px; border-radius:14px;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:0 6px 16px rgba(109,94,252,.30);
    transition:transform .1s ease, background .15s ease; }
  .reset:active { transform:scale(.92); }

  .board-shell { display:flex; justify-content:center; overflow:auto; max-width:100%; max-height:64vh;
    -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
  .board { display:grid; gap:4px; touch-action:pan-x pan-y; user-select:none; -webkit-user-select:none;
    --cell:34px; --cellfont:16px; --z:1; margin:auto; }
  .cell { width:calc(var(--cell) * var(--z)); height:calc(var(--cell) * var(--z));
    border-radius:calc(8px * var(--z)); border:none; background:var(--covered);
    background-image:linear-gradient(160deg,var(--covered-hi),var(--covered)); cursor:pointer; font-weight:800;
    font-size:calc(var(--cellfont) * var(--z)); display:flex; align-items:center; justify-content:center;
    transition:transform .07s ease, background .12s ease, box-shadow .12s ease;
    box-shadow:inset 0 -2px 0 rgba(40,55,90,.06); color:var(--ink); }
  .cell:active:not(.open){ transform:scale(.94); }
  .cell.open { background:var(--revealed); background-image:none; box-shadow:inset 0 0 0 1px var(--line); cursor:default; }
  .cell.flag { background-image:linear-gradient(160deg,#ffe9ec,#ffdde1); }
  [data-theme="dark"] .cell.flag { background-image:linear-gradient(160deg,#3a2630,#3a2630); }
  .cell.mine-hit { background:var(--flag)!important; background-image:none!important; }
  .cell.mine-show { background:var(--accent-soft); background-image:none; }
  .cell.bad-flag { background:#fff0d6; background-image:none; }
  .c1{color:var(--n1)} .c2{color:var(--n2)} .c3{color:var(--n3)} .c4{color:var(--n4)}
  .c5{color:var(--n5)} .c6{color:var(--n6)} .c7{color:var(--n7)} .c8{color:var(--n8)}

  /* Zoom controls */
  .zoombar { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:12px; }
  .zoombar button { border:1px solid var(--line); background:var(--bg); color:var(--ink); font:inherit; font-weight:800;
    font-size:18px; line-height:1; width:40px; height:36px; border-radius:10px; cursor:pointer; transition:all .12s ease; }
  .zoombar button:hover { background:var(--accent-soft); }
  .zoombar button:active { transform:scale(.92); }
  .zoombar .fit { width:auto; padding:0 12px; font-size:13px; font-weight:700; }
  .zoombar .zlabel { min-width:52px; text-align:center; font-size:13px; font-weight:700; color:var(--muted);
    font-variant-numeric:tabular-nums; }

  .status { text-align:center; font-size:14px; color:var(--muted); font-weight:600; min-height:20px; }
  .status.win { color:var(--n2); } .status.lose { color:var(--flag); }
  .best { font-size:13px; color:var(--muted); text-align:center; }
  .best b { color:var(--ink); font-variant-numeric:tabular-nums; }
  .hint { font-size:12px; color:var(--muted); text-align:center; max-width:430px; line-height:1.5; }

  /* Stats view */
  .grid2 { width:100%; display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; }
  .metric { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px; box-shadow:var(--shadow); }
  .metric .label { font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
  .metric .value { font-size:28px; font-weight:800; margin-top:6px; font-variant-numeric:tabular-nums; }
  .section-title { width:100%; font-size:15px; font-weight:800; margin:4px 2px; }
  .best-table { width:100%; background:var(--panel); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:var(--shadow); }
  .best-row { display:flex; justify-content:space-between; padding:13px 16px; font-size:14px; border-top:1px solid var(--line); }
  .best-row:first-child { border-top:none; }
  .best-row b { font-variant-numeric:tabular-nums; }
  .danger { border:none; background:transparent; color:var(--flag); font:inherit; font-weight:700; font-size:13px; cursor:pointer; padding:8px; }

  /* Achievements */
  .ach { width:100%; display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--line);
    border-radius:16px; padding:14px 16px; box-shadow:var(--shadow); opacity:.55; transition:opacity .2s ease; }
  .ach.unlocked { opacity:1; }
  .ach .badge { width:44px; height:44px; border-radius:12px; background:var(--accent-soft); display:flex; align-items:center;
    justify-content:center; font-size:22px; flex:0 0 auto; }
  .ach.unlocked .badge { background:var(--accent); }
  .ach .meta .name { font-weight:800; font-size:15px; }
  .ach .meta .desc { font-size:12.5px; color:var(--muted); margin-top:2px; }
  .ach .tick { margin-left:auto; font-size:18px; color:var(--n2); }
  .ach-progress { width:100%; text-align:center; font-size:13px; color:var(--muted); font-weight:600; }

  .toast { position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 20px); transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:var(--bg); padding:12px 18px; border-radius:14px; font-weight:700; font-size:14px;
    display:flex; align-items:center; gap:10px; box-shadow:0 10px 30px rgba(0,0,0,.3); opacity:0; pointer-events:none;
    transition:opacity .25s ease, transform .25s ease; z-index:50; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* Replay */
  .replay-item { width:100%; display:flex; align-items:center; gap:12px; background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:12px 14px; box-shadow:var(--shadow); }
  .replay-item .ri-main { flex:1; min-width:0; }
  .ri-title { font-weight:800; font-size:14px; }
  .ri-sub { font-size:12px; color:var(--muted); margin-top:2px; }
  .ri-play { border:none; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font:inherit;
    font-weight:700; font-size:13px; padding:8px 14px; border-radius:11px; cursor:pointer; flex:0 0 auto; }
  .ri-play:active { transform:scale(.94); }
  #replayPlayer { display:none; width:100%; flex-direction:column; align-items:center; gap:12px; }
  #replayPlayer.show { display:flex; }
  .replay-board { --cell:26px; --cellfont:13px; }
  .rp-meta { display:flex; gap:16px; font-size:14px; color:var(--muted); font-weight:700; font-variant-numeric:tabular-nums; }
  .rp-meta b { color:var(--ink); }
  .rp-controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center; width:100%; max-width:460px; }
  .rp-controls button { border:1px solid var(--line); background:var(--bg); color:var(--ink); font:inherit; font-weight:800;
    font-size:16px; width:46px; height:40px; border-radius:11px; cursor:pointer; transition:all .12s ease; }
  .rp-controls button:hover { background:var(--accent-soft); }
  .rp-controls button:active { transform:scale(.92); }
  .rp-controls .rp-scrub { flex:1; min-width:110px; accent-color:var(--accent); height:6px; }
  .rp-controls .rp-close { width:auto; padding:0 12px; border:none; background:transparent; color:var(--flag); font-weight:700; font-size:13px; }

  /* 3D board overlay */
  #board3d { display:none; width:100%; height:62vh; max-height:62vh; border-radius:14px; overflow:hidden; touch-action:none; }
  #board3d canvas { display:block; width:100%; height:100%; }
  .sound-btn.on { background:var(--accent); color:#fff; border-color:transparent; }

  @media (max-width:520px){ .board{ --cell:30px; --cellfont:15px; } .replay-board{ --cell:23px; --cellfont:12px; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="dot"></span> Boomsweep</h1>
    <button class="theme-btn" id="themeBtn" title="Change theme">🎨</button>
  </header>

  <div class="tabs">
    <button data-view="play" class="active">Play</button>
    <button data-view="stats">Stats</button>
    <button data-view="awards">Awards</button>
    <button data-view="replay">Replays</button>
  </div>

  <!-- PLAY -->
  <section class="view active" id="view-play">
    <div class="controls">
      <div class="seg" id="difficulty">
        <button data-diff="beginner" class="active">Beginner</button>
        <button data-diff="intermediate">Intermediate</button>
        <button data-diff="expert">Expert</button>
        <button data-diff="custom">Custom</button>
      </div>
      <button class="sound-btn" id="restartBtn" title="Restart this game">↻ Restart</button>
      <button class="sound-btn" id="ddBtn" title="Toggle 3D board">🧊 3D</button>
      <button class="sound-btn" id="soundBtn" title="Toggle sound effects">🔊 Sound</button>
    </div>
    <div class="custom-panel" id="customPanel">
      <div class="field"><label for="inRows">Rows</label><input id="inRows" type="number" min="5" max="30" value="12"></div>
      <div class="field"><label for="inCols">Cols</label><input id="inCols" type="number" min="5" max="40" value="12"></div>
      <div class="field"><label for="inMines">Mines</label><input id="inMines" type="number" min="1" max="500" value="24"></div>
      <button class="apply-btn" id="applyCustom">Apply</button>
    </div>
    <div class="card">
      <div class="hud">
        <div class="stat"><span>🚩</span><span id="mineCount">0</span></div>
        <button class="reset" id="reset" title="New game">🙂</button>
        <div class="stat"><span>⏱️</span><span id="timer">0</span></div>
      </div>
      <div class="board-shell"><div class="board" id="board"></div></div>
      <div id="board3d"></div>
      <div class="zoombar">
        <button id="zoomOut" title="Zoom out" aria-label="Zoom out">−</button>
        <span class="zlabel" id="zoomLabel">100%</span>
        <button id="zoomIn" title="Zoom in" aria-label="Zoom in">+</button>
        <button class="fit" id="zoomReset" title="Fit board">Fit</button>
      </div>
    </div>
    <div class="status" id="status">Tap any tile to start</div>
    <div class="best" id="best"></div>
    <div class="hint">Tap to reveal • Long-press (or right-click) to flag • Pinch or use −/+ to zoom, then drag to pan • Your first tap is always safe</div>
  </section>

  <!-- STATS -->
  <section class="view" id="view-stats">
    <div class="grid2" id="metrics"></div>
    <div class="section-title">Best times</div>
    <div class="best-table" id="bestTable"></div>
    <button class="danger" id="resetStats">Reset all stats & records</button>
  </section>

  <!-- AWARDS -->
  <section class="view" id="view-awards">
    <div class="ach-progress" id="achProgress"></div>
    <div id="achList" style="width:100%; display:flex; flex-direction:column; gap:10px;"></div>
  </section>

  <!-- REPLAY -->
  <section class="view" id="view-replay">
    <div id="replayList" style="width:100%; display:flex; flex-direction:column; gap:10px;"></div>
    <div id="replayPlayer">
      <div class="rp-meta"><span>⏱️ <b id="rpTime">0.0s</b></span><span>Move <b id="rpCount">0 / 0</b></span></div>
      <div class="card">
        <div class="board-shell"><div class="board replay-board" id="replayBoard"></div></div>
      </div>
      <div class="rp-controls">
        <button id="rpBack" title="Step back">⏮</button>
        <button id="rpPlay" title="Play / pause">▶</button>
        <button id="rpFwd" title="Step forward">⏭</button>
        <input type="range" class="rp-scrub" id="rpScrub" min="0" max="0" value="0" aria-label="Replay timeline">
        <button class="rp-close" id="rpClose" title="Close replay">✕ Close</button>
      </div>
      <div class="hint">Scrub the timeline or step through each move to review your game and spot where it went wrong.</div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============ Config ============ */
const LEVELS = {
  beginner:     { rows: 9,  cols: 9,  mines: 10, label: 'Beginner' },
  intermediate: { rows: 16, cols: 16, mines: 40, label: 'Intermediate' },
  expert:       { rows: 16, cols: 30, mines: 99, label: 'Expert' },
  custom:       { rows: 12, cols: 12, mines: 24, label: 'Custom' },
};
const THEMES = ['light','dark','mint','sunset'];

/* ============ Persistence ============ */
const LS = {
  get(k, def){ try { const v = localStorage.getItem(k); return v===null?def:JSON.parse(v); } catch(e){ return def; } },
  set(k, v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} },
};
let best  = LS.get('boomsweep_best', {});
let stats = LS.get('boomsweep_stats', {
  played:0, won:0, lost:0, curStreak:0, bestStreak:0, totalTime:0
});
let unlocked = LS.get('boomsweep_ach', {});
let theme = LS.get('boomsweep_theme', 'light');
let soundOn = LS.get('boomsweep_sound', true);

/* ============ Achievements ============ */
const ACHIEVEMENTS = [
  { id:'first_win',   icon:'🎉', name:'First Clear',     desc:'Win your very first game.' },
  { id:'beg_fast',    icon:'⚡', name:'Quick Sweep',      desc:'Win Beginner in under 30 seconds.' },
  { id:'beg_blitz',   icon:'🚀', name:'Blitz',            desc:'Win Beginner in under 12 seconds.' },
  { id:'inter_clear', icon:'🧩', name:'Intermediate Done',desc:'Clear an Intermediate board.' },
  { id:'expert_clear',icon:'💎', name:'Expert Mind',      desc:'Clear an Expert board.' },
  { id:'flawless',    icon:'🎯', name:'Flawless',         desc:'Win without ever misplacing a flag.' },
  { id:'noflag',      icon:'🧠', name:'No Crutches',      desc:'Win a game without using any flags.' },
  { id:'streak3',     icon:'🔥', name:'On a Roll',        desc:'Win 3 games in a row.' },
  { id:'streak5',     icon:'🌟', name:'Unstoppable',      desc:'Win 5 games in a row.' },
  { id:'streak10',    icon:'👑', name:'Sweep Royalty',    desc:'Win 10 games in a row.' },
  { id:'play10',      icon:'🎮', name:'Getting Hooked',   desc:'Play 10 games.' },
  { id:'play50',      icon:'🏆', name:'Dedicated',        desc:'Play 50 games.' },
];
function unlock(id){
  if (unlocked[id]) return;
  unlocked[id] = Date.now();
  LS.set('boomsweep_ach', unlocked);
  const a = ACHIEVEMENTS.find(x=>x.id===id);
  if (a) showToast(`${a.icon} ${a.name} unlocked!`);
  renderAwards();
}

/* ============ DOM ============ */
const $ = id => document.getElementById(id);
const boardEl=$('board'), mineEl=$('mineCount'), timerEl=$('timer'), resetEl=$('reset'),
  statusEl=$('status'), bestEl=$('best'), diffEl=$('difficulty'), soundBtn=$('soundBtn'),
  customPanel=$('customPanel'), inRows=$('inRows'), inCols=$('inCols'), inMines=$('inMines'),
  applyCustom=$('applyCustom'), themeBtn=$('themeBtn'), toastEl=$('toast'),
  restartBtn=$('restartBtn');

/* ============ State ============ */
let diff='beginner', rows, cols, mines, grid, started, dead, won,
  flagsPlaced, revealedCount, usedFlag, badFlag, timer=0, timerId=null;
let replayMoves=[], replayStartT=0, replayMines=null;

function bestKey(){ return diff==='custom' ? `custom_${rows}x${cols}_${mines}` : diff; }

/* ============ Sound ============ */
let audioCtx=null;
function beep(freq,dur=0.08,type='sine',vol=0.12){
  if(!soundOn) return;
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function seq(notes){ if(!soundOn) return; let t=0; notes.forEach(n=>{ setTimeout(()=>beep(n.f,n.d||0.12,n.t||'triangle',n.v||0.14),t*1000); t+=(n.d||0.12); }); }
const SFX={
  reveal:()=>beep(420,0.05,'sine',0.08), flag:()=>beep(660,0.06,'square',0.07),
  unflag:()=>beep(330,0.06,'square',0.06),
  win:()=>seq([{f:523},{f:659},{f:784},{f:1047,d:0.22}]),
  lose:()=>seq([{f:330,t:'sawtooth'},{f:247,t:'sawtooth'},{f:165,d:0.3,t:'sawtooth'}]),
};

/* ============ Replay recording ============ */
function collectMines(){ const l=[]; for(let r=0;r<rows;r++)for(let c=0;c<cols;c++) if(grid[r][c].mine) l.push([r,c]); return l; }
function recMove(k,r,c){ if(!replayMoves) return; replayMoves.push({k,r,c,t:Math.max(0,Math.round(performance.now()-replayStartT))}); }
function saveReplay(result){
  if(!replayMines || !replayMoves || !replayMoves.length) return;
  const games=LS.get('boomsweep_replays', []);
  games.unshift({ id:Date.now(), date:Date.now(), diff, rows, cols, mines,
    mineList:replayMines, moves:replayMoves, result, time:timer });
  while(games.length>12) games.pop();
  LS.set('boomsweep_replays', games);
}

/* ============ Zoom ============ */
let zoom = 1;
const ZMIN = 0.5, ZMAX = 2.6;
function clampZoom(z){ return Math.max(ZMIN, Math.min(ZMAX, z)); }
function applyZoom(){
  boardEl.style.setProperty('--z', zoom.toFixed(3));
  $('zoomLabel').textContent = Math.round(zoom*100) + '%';
}

/* ============ Game ============ */
function init(){
  const cfg=LEVELS[diff]; rows=cfg.rows; cols=cfg.cols; mines=cfg.mines;
  grid=Array.from({length:rows},()=>Array.from({length:cols},()=>({mine:false,revealed:false,flagged:false,count:0})));
  started=false; dead=false; won=false; flagsPlaced=0; revealedCount=0; usedFlag=false; badFlag=false;
  replayMoves=[]; replayStartT=performance.now(); replayMines=null;
  stopTimer(); timer=0; timerEl.textContent='0'; resetEl.textContent='🙂';
  statusEl.textContent='Tap any tile to start'; statusEl.className='status';
  updateMineCount(); renderBoard(); renderBest(); applyZoom();
}
function renderBoard(){
  boardEl.style.gridTemplateColumns=`repeat(${cols}, 1fr)`; boardEl.innerHTML='';
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const b=document.createElement('button'); b.className='cell'; b.dataset.r=r; b.dataset.c=c; boardEl.appendChild(b);
  }
}
const cellEl=(r,c)=>boardEl.children[r*cols+c];
function eachN(r,c,fn){ for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){ if(!dr&&!dc)continue;
  const nr=r+dr,nc=c+dc; if(nr>=0&&nr<rows&&nc>=0&&nc<cols) fn(nr,nc); } }
function placeMines(sr,sc){
  const safe=new Set([sr+','+sc]); eachN(sr,sc,(r,c)=>safe.add(r+','+c));
  const spots=[]; for(let r=0;r<rows;r++)for(let c=0;c<cols;c++) if(!safe.has(r+','+c)) spots.push([r,c]);
  for(let i=spots.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [spots[i],spots[j]]=[spots[j],spots[i]]; }
  const count=Math.min(mines,spots.length);
  for(let i=0;i<count;i++){ const[r,c]=spots[i]; grid[r][c].mine=true; }
  mines=count;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){ if(grid[r][c].mine)continue; let n=0; eachN(r,c,(nr,nc)=>{if(grid[nr][nc].mine)n++;}); grid[r][c].count=n; }
}
function reveal(r,c){
  const cell=grid[r][c]; if(cell.revealed||cell.flagged) return;
  cell.revealed=true; revealedCount++; paintCell(r,c);
  if(cell.count===0&&!cell.mine) eachN(r,c,(nr,nc)=>{ if(!grid[nr][nc].revealed) reveal(nr,nc); });
}
function paintCell(r,c){
  const cell=grid[r][c], el=cellEl(r,c); el.className='cell'; el.textContent='';
  if(cell.flagged&&!cell.revealed){ el.classList.add('flag'); el.textContent='🚩'; return; }
  if(cell.revealed){ el.classList.add('open');
    if(cell.mine){ el.classList.add('mine-hit'); el.textContent='💣'; }
    else if(cell.count>0){ el.textContent=cell.count; el.classList.add('c'+cell.count); } }
}
function onLeft(r,c){
  if(dead||won) return; const cell=grid[r][c]; if(cell.flagged) return;
  if(!started){ placeMines(r,c); started=true; startTimer(); updateMineCount(); replayMines=collectMines(); }
  recMove('r',r,c);
  if(cell.mine){ cell.revealed=true; SFX.lose(); loseGame(r,c); return; }
  reveal(r,c); SFX.reveal(); checkWin();
}
function onRight(r,c){
  if(dead||won) return; const cell=grid[r][c]; if(cell.revealed) return;
  cell.flagged=!cell.flagged; flagsPlaced+=cell.flagged?1:-1;
  recMove(cell.flagged?'f':'u',r,c);
  if(cell.flagged){ usedFlag=true; if(!cell.mine) badFlag=true; SFX.flag(); } else SFX.unflag();
  paintCell(r,c); updateMineCount();
}
function loseGame(hitR,hitC){
  dead=true; stopTimer(); resetEl.textContent='😵';
  statusEl.textContent='Boom! Game over'; statusEl.className='status lose';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const cell=grid[r][c], el=cellEl(r,c);
    if(cell.mine&&!cell.flagged){ el.className='cell open'; el.textContent='💣';
      el.classList.add(r===hitR&&c===hitC?'mine-hit':'mine-show'); }
    else if(cell.flagged&&!cell.mine){ el.className='cell open bad-flag'; el.textContent='❌'; }
  }
  stats.played++; stats.lost++; stats.curStreak=0; saveStats();
  checkPlayAchievements();
  saveReplay('lose');
}
function checkWin(){
  if(revealedCount!==rows*cols-mines) return;
  won=true; stopTimer(); resetEl.textContent='😎'; SFX.win(); statusEl.className='status win';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++) if(grid[r][c].mine&&!grid[r][c].flagged){ grid[r][c].flagged=true; flagsPlaced++; paintCell(r,c); }
  updateMineCount();
  const k=bestKey(); const record = best[k]===undefined || timer<best[k];
  if(record){ best[k]=timer; LS.set('boomsweep_best',best); }
  statusEl.textContent = record ? `Solved in ${timer}s — new best!` : `Solved in ${timer}s!`;
  // stats
  stats.played++; stats.won++; stats.curStreak++; stats.totalTime+=timer;
  if(stats.curStreak>stats.bestStreak) stats.bestStreak=stats.curStreak;
  saveStats();
  // achievements
  unlock('first_win');
  if(diff==='beginner'&&timer<30) unlock('beg_fast');
  if(diff==='beginner'&&timer<12) unlock('beg_blitz');
  if(diff==='intermediate') unlock('inter_clear');
  if(diff==='expert') unlock('expert_clear');
  if(!badFlag) unlock('flawless');
  if(!usedFlag) unlock('noflag');
  if(stats.curStreak>=3) unlock('streak3');
  if(stats.curStreak>=5) unlock('streak5');
  if(stats.curStreak>=10) unlock('streak10');
  checkPlayAchievements();
  renderBest();
  saveReplay('win');
}
function checkPlayAchievements(){
  if(stats.played>=10) unlock('play10');
  if(stats.played>=50) unlock('play50');
}
function updateMineCount(){ mineEl.textContent=mines-flagsPlaced; }
function startTimer(){ stopTimer(); timerId=setInterval(()=>{ timer++; timerEl.textContent=timer; },1000); }
function stopTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } }
function saveStats(){ LS.set('boomsweep_stats',stats); renderStats(); }

function renderBest(){
  const label = diff==='custom' ? `Custom ${rows}×${cols}, ${mines} mines` : LEVELS[diff].label;
  const v=best[bestKey()];
  bestEl.innerHTML=`Best (${label}): <b>${v!==undefined?v+'s':'—'}</b>`;
}

/* ============ Stats view ============ */
function fmtTime(s){ if(!s) return '0m'; const m=Math.floor(s/60), sec=s%60; return m?`${m}m ${sec}s`:`${sec}s`; }
function renderStats(){
  const winRate = stats.played ? Math.round(stats.won/stats.played*100) : 0;
  const metrics=[
    ['Games played', stats.played], ['Wins', stats.won], ['Losses', stats.lost],
    ['Win rate', winRate+'%'], ['Current streak', stats.curStreak], ['Best streak', stats.bestStreak],
    ['Time played', fmtTime(stats.totalTime)],
  ];
  $('metrics').innerHTML = metrics.map(([l,v])=>`<div class="metric"><div class="label">${l}</div><div class="value">${v}</div></div>`).join('');
  const rows=[['beginner','Beginner'],['intermediate','Intermediate'],['expert','Expert']]
    .map(([k,l])=>`<div class="best-row"><span>${l}</span><b>${best[k]!==undefined?best[k]+'s':'—'}</b></div>`);
  const customs=Object.keys(best).filter(k=>k.startsWith('custom_'))
    .map(k=>`<div class="best-row"><span>${k.replace('custom_','Custom ').replace('_',' · ')+' mines'}</span><b>${best[k]}s</b></div>`);
  $('bestTable').innerHTML = rows.concat(customs).join('');
}

/* ============ Awards view ============ */
function renderAwards(){
  const count=Object.keys(unlocked).filter(id=>ACHIEVEMENTS.some(a=>a.id===id)).length;
  $('achProgress').textContent=`${count} of ${ACHIEVEMENTS.length} unlocked`;
  $('achList').innerHTML=ACHIEVEMENTS.map(a=>{
    const on=!!unlocked[a.id];
    return `<div class="ach ${on?'unlocked':''}"><div class="badge">${a.icon}</div>
      <div class="meta"><div class="name">${a.name}</div><div class="desc">${a.desc}</div></div>
      ${on?'<div class="tick">✓</div>':''}</div>`;
  }).join('');
}

/* ============ Replay view ============ */
let rp={ game:null, idx:0, playing:false, timerId:null, grid:null };
function renderReplayList(){
  rpPause(); $('replayPlayer').classList.remove('show'); $('replayList').style.display='';
  const games=LS.get('boomsweep_replays', []);
  if(!games.length){ $('replayList').innerHTML='<div class="hint">No replays yet. Finish a game and it will be saved here automatically — your last 12 games are kept.</div>'; return; }
  $('replayList').innerHTML=games.map((g,i)=>{
    const lvl=g.diff==='custom'?`Custom ${g.rows}×${g.cols}`:LEVELS[g.diff].label;
    const res=g.result==='win'?'✅ Win':'💥 Loss';
    const d=new Date(g.date);
    return `<div class="replay-item"><div class="ri-main"><div class="ri-title">${lvl} — ${res}</div>
      <div class="ri-sub">${g.time}s • ${g.moves.length} moves • ${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>
      <button class="ri-play" data-i="${i}">▶ Watch</button></div>`;
  }).join('');
}
function buildReplayGrid(g){
  const gr=Array.from({length:g.rows},()=>Array.from({length:g.cols},()=>({mine:false,revealed:false,flagged:false,count:0})));
  g.mineList.forEach(([r,c])=>{ if(gr[r]&&gr[r][c]) gr[r][c].mine=true; });
  for(let r=0;r<g.rows;r++)for(let c=0;c<g.cols;c++){ if(gr[r][c].mine)continue; let n=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){ if(!dr&&!dc)continue; const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<g.rows&&nc>=0&&nc<g.cols&&gr[nr][nc].mine)n++; } gr[r][c].count=n; }
  rp.grid=gr;
  const bd=$('replayBoard'); bd.style.gridTemplateColumns=`repeat(${g.cols}, 1fr)`; bd.innerHTML='';
  for(let r=0;r<g.rows;r++)for(let c=0;c<g.cols;c++){ const b=document.createElement('div'); b.className='cell'; bd.appendChild(b); }
}
function replayReveal(gr,g,r,c){
  const cell=gr[r][c]; if(cell.revealed||cell.flagged) return;
  cell.revealed=true;
  if(cell.count===0&&!cell.mine) for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){ if(!dr&&!dc)continue;
    const nr=r+dr,nc=c+dc; if(nr>=0&&nr<g.rows&&nc>=0&&nc<g.cols&&!gr[nr][nc].revealed) replayReveal(gr,g,nr,nc); }
}
function renderReplayAt(idx){
  const g=rp.game, gr=rp.grid; if(!g||!gr) return;
  idx=Math.max(0,Math.min(g.moves.length,idx));
  for(let r=0;r<g.rows;r++)for(let c=0;c<g.cols;c++){ gr[r][c].revealed=false; gr[r][c].flagged=false; }
  let lastHit=null;
  for(let m=0;m<idx;m++){ const mv=g.moves[m];
    if(mv.k==='r'){ replayReveal(gr,g,mv.r,mv.c); if(gr[mv.r][mv.c].mine) lastHit=[mv.r,mv.c]; }
    else if(mv.k==='f'){ if(gr[mv.r][mv.c]) gr[mv.r][mv.c].flagged=true; }
    else if(mv.k==='u'){ if(gr[mv.r][mv.c]) gr[mv.r][mv.c].flagged=false; }
  }
  const bd=$('replayBoard');
  for(let r=0;r<g.rows;r++)for(let c=0;c<g.cols;c++){
    const cell=gr[r][c], el=bd.children[r*g.cols+c]; if(!el) continue; el.className='cell'; el.textContent='';
    if(cell.flagged&&!cell.revealed){ el.classList.add('flag'); el.textContent='🚩'; continue; }
    if(cell.revealed){ el.classList.add('open');
      if(cell.mine){ el.classList.add(lastHit&&lastHit[0]===r&&lastHit[1]===c?'mine-hit':'mine-show'); el.textContent='💣'; }
      else if(cell.count>0){ el.textContent=cell.count; el.classList.add('c'+cell.count); } }
  }
  rp.idx=idx; $('rpScrub').value=idx; $('rpCount').textContent=`${idx} / ${g.moves.length}`;
  const t=idx>0 ? g.moves[idx-1].t : 0; $('rpTime').textContent=(t/1000).toFixed(1)+'s';
}
function openReplay(i){
  const games=LS.get('boomsweep_replays', []), g=games[i]; if(!g) return;
  rp.game=g; rp.idx=0; rp.playing=false;
  buildReplayGrid(g);
  $('replayList').style.display='none'; $('replayPlayer').classList.add('show');
  $('rpScrub').max=g.moves.length; $('rpScrub').value=0; $('rpPlay').textContent='▶';
  renderReplayAt(0);
}
function rpPause(){ rp.playing=false; if($('rpPlay'))$('rpPlay').textContent='▶'; if(rp.timerId){ clearInterval(rp.timerId); rp.timerId=null; } }
function rpPlay(){
  if(!rp.game) return;
  if(rp.idx>=rp.game.moves.length) renderReplayAt(0);
  rp.playing=true; $('rpPlay').textContent='⏸';
  rp.timerId=setInterval(()=>{ if(rp.idx>=rp.game.moves.length){ rpPause(); return; } renderReplayAt(rp.idx+1); }, 480);
}

/* ============ Theme + toast ============ */
function applyTheme(){ document.documentElement.setAttribute('data-theme',theme);
  document.querySelector('meta[name=theme-color]').setAttribute('content', getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#4c7dff'); }
let toastTimer=null;
function showToast(msg){ toastEl.textContent=msg; toastEl.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2200); }

/* ============ Events ============ */
boardEl.addEventListener('click',e=>{ if(pinching) return; const el=e.target.closest('.cell'); if(el) onLeft(+el.dataset.r,+el.dataset.c); });
boardEl.addEventListener('contextmenu',e=>{ const el=e.target.closest('.cell'); if(!el)return; e.preventDefault(); onRight(+el.dataset.r,+el.dataset.c); });
let pressTimer=null,longPressed=false;
boardEl.addEventListener('touchstart',e=>{ if(e.touches.length>1){ if(pressTimer)clearTimeout(pressTimer); return; }
  const el=e.target.closest('.cell'); if(!el)return; longPressed=false;
  pressTimer=setTimeout(()=>{ longPressed=true; onRight(+el.dataset.r,+el.dataset.c); },380); },{passive:true});
boardEl.addEventListener('touchmove',e=>{ if(pressTimer)clearTimeout(pressTimer); },{passive:true});
boardEl.addEventListener('touchend',e=>{ if(pressTimer)clearTimeout(pressTimer); if(longPressed)e.preventDefault(); },{passive:false});

/* ---- pinch-to-zoom on the board area ---- */
const shellEl = document.querySelector('.board-shell');
let pinching=false, pinchStartDist=0, pinchStartZoom=1;
function touchDist(t){ const dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY; return Math.hypot(dx,dy); }
shellEl.addEventListener('touchstart',e=>{ if(e.touches.length===2){ pinching=true; pinchStartDist=touchDist(e.touches)||1; pinchStartZoom=zoom; } },{passive:true});
shellEl.addEventListener('touchmove',e=>{ if(e.touches.length===2){ e.preventDefault(); const d=touchDist(e.touches);
  zoom=clampZoom(pinchStartZoom*(d/pinchStartDist)); applyZoom(); } },{passive:false});
shellEl.addEventListener('touchend',e=>{ if(e.touches.length<2){ if(pinching) setTimeout(()=>{ pinching=false; },60); } },{passive:true});

/* zoom buttons */
$('zoomIn').addEventListener('click',()=>{ zoom=clampZoom(zoom+0.2); applyZoom(); });
$('zoomOut').addEventListener('click',()=>{ zoom=clampZoom(zoom-0.2); applyZoom(); });
$('zoomReset').addEventListener('click',()=>{ zoom=1; applyZoom(); });

resetEl.addEventListener('click',init);
diffEl.addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  [...diffEl.children].forEach(x=>x.classList.remove('active')); b.classList.add('active');
  diff=b.dataset.diff; customPanel.classList.toggle('show',diff==='custom'); init(); });
applyCustom.addEventListener('click',()=>{
  const r=Math.max(5,Math.min(30,parseInt(inRows.value)||12));
  const c=Math.max(5,Math.min(40,parseInt(inCols.value)||12));
  const maxM=Math.max(1,r*c-9); const m=Math.max(1,Math.min(maxM,parseInt(inMines.value)||24));
  inRows.value=r; inCols.value=c; inMines.value=m;
  LEVELS.custom={rows:r,cols:c,mines:m,label:'Custom'}; diff='custom'; init();
});
soundBtn.addEventListener('click',()=>{ soundOn=!soundOn; LS.set('boomsweep_sound',soundOn);
  soundBtn.textContent=soundOn?'🔊 Sound':'🔇 Muted'; if(soundOn) beep(660,0.07,'sine',0.1); });
restartBtn.addEventListener('click',init);

/* replay controls */
$('replayList').addEventListener('click',e=>{ const b=e.target.closest('.ri-play'); if(b) openReplay(+b.dataset.i); });
$('rpBack').addEventListener('click',()=>{ rpPause(); renderReplayAt(rp.idx-1); });
$('rpFwd').addEventListener('click',()=>{ rpPause(); renderReplayAt(rp.idx+1); });
$('rpPlay').addEventListener('click',()=>{ rp.playing?rpPause():rpPlay(); });
$('rpScrub').addEventListener('input',e=>{ rpPause(); renderReplayAt(+e.target.value); });
$('rpClose').addEventListener('click',renderReplayList);
themeBtn.addEventListener('click',()=>{ theme=THEMES[(THEMES.indexOf(theme)+1)%THEMES.length];

document.querySelector('.tabs').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;

$('resetStats').addEventListener('click',()=>{
  if(!confirm('Reset all stats, best times and achievements? This cannot be undone.')) return;
  best={}; stats={played:0,won:0,lost:0,curStreak:0,bestStreak:0,totalTime:0}; unlocked={};
  LS.set('boomsweep_best',best); LS.set('boomsweep_stats',stats); LS.set('boomsweep_ach',unlocked);
  renderStats(); renderAwards(); renderBest(); showToast('Stats reset');
});

/* ============ 3D board (optional overlay; reuses the 2D engine as source of truth) ============ */
const ddBtn=$('ddBtn');
let threeD={ on:false, ready:false, R:0, C:0, colorsDirty:true, wasDead:false, raf:null,
  scene:null, camera:null, renderer:null, board:null, tiles:null, platform:null, key:null,
  cam:{theta:Math.PI*0.5, phi:0.64, radius:14}, autoRotate:true };
let dd3=null; const ddRay = (window.THREE) ? new THREE.Raycaster() : null;
const DD_CELL=1.0, DD_GAP=0.08;
function ddCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim()||'#888888'; }
function ddCol(v){ return new THREE.Color(ddCss(v)); }
function ddGlyph(text,colorCss,bold){
  const S=128,c=document.createElement('canvas'); c.width=c.height=S; const g=c.getContext('2d');
  g.clearRect(0,0,S,S); g.fillStyle=colorCss; g.textAlign='center'; g.textBaseline='middle';
  g.font=(bold?'800 ':'700 ')+(String(text).length>1?64:82)+'px -apple-system,Segoe UI,Roboto,Arial,sans-serif';
  g.fillText(text,S/2,S/2+4); const t=new THREE.CanvasTexture(c); t.anisotropy=4; return t;
}
function ddTween(dur,onUpdate,onDone,ease){ return { t0:performance.now(), dur, onUpdate, onDone, ease:ease||(t=>1-Math.pow(1-t,3)), done:false }; }
function ddPop(obj,to,dur,delay,back){ const start=performance.now()+(delay||0);
  const eb=t=>{const s=1.70158;return 1+(s+1)*Math.pow(t-1,3)+s*Math.pow(t-1,2);};
  threeD.effects.push({ t0:start, dur, ease: back?eb:(t=>1-Math.pow(1-t,3)), onUpdate:ep=>{ const s=to*Math.max(0.001,ep); obj.scale.set(s,s,s); }, onDone:null, done:false }); }
threeD.effects=[]; threeD.flagSway=[];

function ddMakeFlag(){
  const g=new THREE.Group();
  const poleMat=new THREE.MeshStandardMaterial({ color:0xd7dcf5, roughness:0.35, metalness:0.55 });
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,0.5,12),poleMat); pole.position.y=0.25; pole.castShadow=true; g.add(pole);
  const knob=new THREE.Mesh(new THREE.SphereGeometry(0.05,14,12),poleMat); knob.position.y=0.5; g.add(knob);
  const sh=new THREE.Shape(); sh.moveTo(0,0); sh.lineTo(0.3,0.085); sh.lineTo(0,0.17); sh.lineTo(0,0);
  const flag=new THREE.Mesh(new THREE.ExtrudeGeometry(sh,{depth:0.016,bevelEnabled:false}),
    new THREE.MeshStandardMaterial({ color:new THREE.Color(ddCss('--flag')), roughness:0.45, emissive:0x330a1c, emissiveIntensity:0.3, side:THREE.DoubleSide }));
  flag.position.set(0.03,0.3,0); flag.castShadow=true; g.add(flag); g.userData.flag=flag; return g;
}
function ddMakeBomb(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.SphereGeometry(0.3,24,18), new THREE.MeshStandardMaterial({ color:0x14161f, roughness:0.28, metalness:0.4 })); body.castShadow=true; g.add(body);
  const cap=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.11,0.09,14), new THREE.MeshStandardMaterial({ color:0x2a2f3e, roughness:0.5, metalness:0.5 })); cap.position.y=0.3; g.add(cap);
  const fuse=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.17,8), new THREE.MeshStandardMaterial({ color:0x8a6a3a, roughness:0.9 })); fuse.position.set(0.05,0.42,0); fuse.rotation.z=-0.5; g.add(fuse);
  const spark=new THREE.Mesh(new THREE.SphereGeometry(0.045,10,10), new THREE.MeshStandardMaterial({ color:0xffd67a, emissive:0xffab3d, emissiveIntensity:1.6 })); spark.position.set(0.12,0.5,0); g.add(spark);
  return g;
}
function ddBurst(x,y,z){
  const B=threeD.board, E=threeD.effects;
  const pl=new THREE.PointLight(0xffa64d,0,8,2); pl.position.set(x,y+0.35,z); B.add(pl);
  E.push(ddTween(520, ep=>{ pl.intensity=Math.max(0,(1-ep))*10; }, ()=>B.remove(pl), t=>t));
  const ring=new THREE.Mesh(new THREE.RingGeometry(0.14,0.24,44), new THREE.MeshBasicMaterial({ color:0xffb257, transparent:true, opacity:0.95, side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false }));
  ring.rotation.x=-Math.PI/2; ring.position.set(x,0.24,z); B.add(ring);
  E.push(ddTween(640, ep=>{ const s=0.4+ep*6; ring.scale.set(s,s,s); ring.material.opacity=0.95*(1-ep); }, ()=>B.remove(ring), t=>t));
  const core=new THREE.Mesh(new THREE.SphereGeometry(0.22,16,14), new THREE.MeshBasicMaterial({ color:0xffcf7a, transparent:true, opacity:0.9, blending:THREE.AdditiveBlending, depthWrite:false }));
  core.position.set(x,y+0.1,z); B.add(core);
  E.push(ddTween(360, ep=>{ const s=1+ep*2.4; core.scale.set(s,s,s); core.material.opacity=0.9*(1-ep); }, ()=>B.remove(core), t=>t));
  const parts=[];
  for(let i=0;i<14;i++){ const p=new THREE.Mesh(new THREE.SphereGeometry(0.05,8,6), new THREE.MeshStandardMaterial({ color:0x1a1d28, roughness:0.6, emissive:0x3a2410, emissiveIntensity:0.35 }));
    p.position.set(x,y,z); B.add(p); const a=Math.random()*Math.PI*2, up=2+Math.random()*2.4, out=1.3+Math.random()*1.9;
    parts.push({ mesh:p, vx:Math.cos(a)*out, vy:up, vz:Math.sin(a)*out }); }
  E.push({ t0:performance.now(), dur:760, ease:t=>t, onUpdate:()=>{ const dt=0.016; parts.forEach(pp=>{ pp.vy-=9.2*dt; pp.mesh.position.x+=pp.vx*dt; pp.mesh.position.y+=pp.vy*dt; pp.mesh.position.z+=pp.vz*dt; }); }, onDone:()=>parts.forEach(pp=>B.remove(pp.mesh)), done:false });
}
function ddBoom(){ if(!soundOn) return; try{
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  const t=audioCtx.currentTime, o=audioCtx.createOscillator(), og=audioCtx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(110,t); o.frequency.exponentialRampToValueAtTime(40,t+0.5);
  og.gain.setValueAtTime(0.0001,t); og.gain.exponentialRampToValueAtTime(0.4,t+0.03); og.gain.exponentialRampToValueAtTime(0.0001,t+0.7);
  o.connect(og); og.connect(audioCtx.destination); o.start(t); o.stop(t+0.75);
  const src=audioCtx.createBufferSource(); const len=Math.floor(audioCtx.sampleRate*0.9), bf=audioCtx.createBuffer(1,len,audioCtx.sampleRate), d=bf.getChannelData(0);
  let last=0; for(let i=0;i<len;i++){ const w=Math.random()*2-1; last=(last+0.02*w)/1.02; d[i]=(w*0.35+last*3)*0.55; }
  src.buffer=bf; const lp=audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(1000,t); lp.frequency.exponentialRampToValueAtTime(200,t+0.6);
  const ng=audioCtx.createGain(); ng.gain.setValueAtTime(0.0001,t); ng.gain.exponentialRampToValueAtTime(0.26,t+0.04); ng.gain.exponentialRampToValueAtTime(0.0001,t+0.85);
  src.connect(lp); lp.connect(ng); ng.connect(audioCtx.destination); src.start(t); src.stop(t+0.9);
}catch(e){} }

function init3D(){
  if(threeD.ready) return;
  dd3=$('board3d');
  const rd=new THREE.WebGLRenderer({ antialias:true, alpha:true });
  rd.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  rd.shadowMap.enabled=true; rd.shadowMap.type=THREE.PCFSoftShadowMap;
  if('outputEncoding' in rd) rd.outputEncoding=THREE.sRGBEncoding;
  if('toneMapping' in rd){ rd.toneMapping=THREE.ACESFilmicToneMapping; rd.toneMappingExposure=1.0; }
  dd3.appendChild(rd.domElement);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(42,1,0.1,100);
  scene.add(new THREE.HemisphereLight(0xffffff,0x707890,0.55));
  scene.add(new THREE.AmbientLight(0xffffff,0.28));
  const key=new THREE.DirectionalLight(0xffffff,1.15); key.position.set(6,13,5); key.castShadow=true;
  key.shadow.mapSize.set(2048,2048); key.shadow.camera.near=1; key.shadow.camera.far=48;
  key.shadow.camera.left=-16;key.shadow.camera.right=16;key.shadow.camera.top=16;key.shadow.camera.bottom=-16;
  key.shadow.bias=-0.0005; key.shadow.radius=4; scene.add(key);
  const rim=new THREE.DirectionalLight(0xafa0ff,0.4); rim.position.set(-6,5,-6); scene.add(rim);
  const boardG=new THREE.Group(); scene.add(boardG);
  threeD.scene=scene; threeD.camera=camera; threeD.renderer=rd; threeD.board=boardG; threeD.key=key;
  ddInput(rd.domElement); threeD.ready=true; ddResize();
  window.addEventListener('resize', ()=>{ if(threeD.on) ddResize(); });
}
function ddResize(){ if(!threeD.ready) return;
  const w=dd3.clientWidth||360, h=dd3.clientHeight||Math.round(window.innerHeight*0.62);
  threeD.renderer.setSize(w,h,false); threeD.camera.aspect=w/Math.max(1,h); threeD.camera.updateProjectionMatrix(); }
function ddX(c,C){ return c*(DD_CELL+DD_GAP)-(C*(DD_CELL+DD_GAP)-DD_GAP)/2+DD_CELL/2; }
function ddZ(r,R){ return r*(DD_CELL+DD_GAP)-(R*(DD_CELL+DD_GAP)-DD_GAP)/2+DD_CELL/2; }
function ddBuild(){
  const B=threeD.board; for(let i=B.children.length-1;i>=0;i--) B.remove(B.children[i]);
  threeD.effects.length=0; threeD.flagSway.length=0; threeD.R=rows; threeD.C=cols; threeD.wasDead=false;
  const spanX=cols*(DD_CELL+DD_GAP)-DD_GAP, spanZ=rows*(DD_CELL+DD_GAP)-DD_GAP;
  const plat=new THREE.Mesh(new THREE.BoxGeometry(spanX+0.9,0.5,spanZ+0.9), new THREE.MeshStandardMaterial({ color:ddCol('--line'), roughness:0.9 }));
  plat.position.y=-0.55; plat.receiveShadow=true; B.add(plat); threeD.platform=plat;
  const geo=new THREE.BoxGeometry(DD_CELL,0.42,DD_CELL), capGeo=new THREE.PlaneGeometry(DD_CELL*0.98,DD_CELL*0.98);
  threeD.tiles=[];
  for(let r=0;r<rows;r++){ const row=[];
    for(let c=0;c<cols;c++){
      const mesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({ color:ddCol('--covered'), roughness:0.5, metalness:0.05 }));
      mesh.position.set(ddX(c,cols),0,ddZ(r,rows)); mesh.castShadow=true; mesh.receiveShadow=true; mesh.userData={r,c}; B.add(mesh);
      const cap=new THREE.Mesh(capGeo,new THREE.MeshStandardMaterial({ color:ddCol('--covered-hi'), roughness:0.5 }));
      cap.rotation.x=-Math.PI/2; cap.position.y=0.212; mesh.add(cap);
      row.push({ mesh, cap, num:null, flag:null, bomb:null, mark:null, sig:'' });
    } threeD.tiles.push(row);
  }
  threeD.cam.radius=Math.max(spanX,spanZ)*1.15+4; threeD.autoRotate=true; threeD.cam.theta=Math.PI*0.5; threeD.cam.phi=0.64; threeD.colorsDirty=false;
}
function ddRecolor(){ threeD.colorsDirty=false; if(threeD.platform) threeD.platform.material.color.copy(ddCol('--line'));
  if(threeD.tiles) for(const row of threeD.tiles) for(const t of row) t.sig=''; }
function ddState(r,c){ const cell=grid[r][c];
  if(!cell.revealed&&cell.flagged) return 'flag';
  if(cell.revealed&&cell.mine) return 'hit';
  if(dead&&cell.mine&&!cell.flagged) return 'mine';
  if(dead&&cell.flagged&&!cell.mine) return 'bad';
  if(cell.revealed&&!cell.mine) return 'n'+cell.count;
  return 'cov'; }
function ddApply(r,c){
  const t=threeD.tiles[r][c], st=ddState(r,c); if(t.sig===st) return; t.sig=st;
  if(t.num){ t.mesh.remove(t.num); t.num=null; } if(t.mark){ t.mesh.remove(t.mark); t.mark=null; }
  if(t.flag){ threeD.board.remove(t.flag); const i=threeD.flagSway.indexOf(t.flag); if(i>=0)threeD.flagSway.splice(i,1); t.flag=null; }
  if(t.bomb){ threeD.board.remove(t.bomb); t.bomb=null; }
  t.mesh.material.color.copy(ddCol('--covered')); if(t.cap){ t.cap.visible=true; t.cap.material.color.copy(ddCol('--covered-hi')); }
  const px=t.mesh.position.x, pz=t.mesh.position.z;
  if(st==='cov'){ t.mesh.position.y=0; return; }
  if(st==='flag'){ t.mesh.position.y=0; const g=ddMakeFlag(); g.position.set(px,0.21,pz); threeD.board.add(g); t.flag=g; threeD.flagSway.push(g); g.scale.set(0.01,0.01,0.01); ddPop(g,1,300,0,true); return; }
  if(st[0]==='n'){ t.mesh.position.y=-0.2; t.mesh.material.color.copy(ddCol('--revealed')); if(t.cap) t.cap.material.color.copy(ddCol('--revealed'));
    const n=+st.slice(1); if(n>0){ const num=new THREE.Mesh(new THREE.PlaneGeometry(0.72,0.72), new THREE.MeshBasicMaterial({ map:ddGlyph(n, ddCss('--n'+n), true), transparent:true, depthWrite:false })); num.rotation.x=-Math.PI/2; num.position.set(0,0.235,0); t.mesh.add(num); t.num=num; } return; }
  if(st==='hit'||st==='mine'){ t.mesh.position.y=(st==='hit')?-0.16:0;
    t.mesh.material.color.copy(new THREE.Color(st==='hit'?ddCss('--flag'):ddCss('--revealed')));
    const b=ddMakeBomb(); b.position.set(px,0.35,pz); threeD.board.add(b); t.bomb=b; b.scale.set(0.01,0.01,0.01); ddPop(b, st==='hit'?1.05:0.85, 320, 0, true);
    if(st==='hit'){ ddBurst(px,0.5,pz); ddBoom(); } return; }
  if(st==='bad'){ t.mesh.position.y=-0.12; t.mesh.material.color.copy(new THREE.Color('#caa14a'));
    const x=new THREE.Mesh(new THREE.PlaneGeometry(0.6,0.6), new THREE.MeshBasicMaterial({ map:ddGlyph('✕','#b06a10',true), transparent:true, depthWrite:false })); x.rotation.x=-Math.PI/2; x.position.set(0,0.235,0); t.mesh.add(x); t.mark=x; return; }
}
function ddCamera(){ const cm=threeD.cam, R=cm.radius, sp=Math.sin(cm.phi), cp=Math.cos(cm.phi);
  threeD.camera.position.set(R*sp*Math.cos(cm.theta), R*cp, R*sp*Math.sin(cm.theta)); threeD.camera.lookAt(0,0,0); }
function ddPick(cx,cy){ if(!threeD.tiles) return null;
  const rect=threeD.renderer.domElement.getBoundingClientRect();
  ddRay.setFromCamera({ x:((cx-rect.left)/rect.width)*2-1, y:-((cy-rect.top)/rect.height)*2+1 }, threeD.camera);
  const meshes=[]; for(const row of threeD.tiles) for(const t of row) meshes.push(t.mesh);
  const hit=ddRay.intersectObjects(meshes,false)[0]; return hit?hit.object.userData:null; }
function ddInput(el){
  let pd=null, pt=null, lp=false; const MV=9, LONG=380;
  el.addEventListener('pointerdown',e=>{ try{el.setPointerCapture(e.pointerId);}catch(_){}
    threeD.autoRotate=false; const tile=ddPick(e.clientX,e.clientY); pd={x:e.clientX,y:e.clientY,tile,moved:false,orbit:false}; lp=false;
    if(tile) pt=setTimeout(()=>{ if(pd&&!pd.moved){ lp=true; onRight(tile.r,tile.c); } },LONG); });
  el.addEventListener('pointermove',e=>{ if(!pd)return; const dx=e.clientX-pd.x, dy=e.clientY-pd.y;
    if(!pd.moved&&Math.hypot(dx,dy)>MV){ pd.moved=true; pd.orbit=true; if(pt)clearTimeout(pt); }
    if(pd.orbit){ threeD.cam.theta-=dx*0.006; threeD.cam.phi=Math.max(0.28,Math.min(1.2,threeD.cam.phi-dy*0.006)); pd.x=e.clientX; pd.y=e.clientY; } });
  function up(e){ if(!pd)return; if(pt)clearTimeout(pt);
    if(!pd.moved&&!lp&&pd.tile){ const t2=ddPick(e.clientX,e.clientY); if(t2&&t2.r===pd.tile.r&&t2.c===pd.tile.c) onLeft(pd.tile.r,pd.tile.c); } pd=null; }
  el.addEventListener('pointerup',up); el.addEventListener('pointercancel',()=>{ if(pt)clearTimeout(pt); pd=null; });
  el.addEventListener('contextmenu',e=>{ e.preventDefault(); const t=ddPick(e.clientX,e.clientY); if(t) onRight(t.r,t.c); });
  el.addEventListener('wheel',e=>{ e.preventDefault(); threeD.cam.radius=Math.max(6,Math.min(40,threeD.cam.radius+Math.sign(e.deltaY)*1.2)); },{passive:false});
  let pdst=0; el.addEventListener('touchstart',e=>{ if(e.touches.length===2) pdst=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); },{passive:true});
  el.addEventListener('touchmove',e=>{ if(e.touches.length===2){ e.preventDefault(); const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); if(pdst) threeD.cam.radius=Math.max(6,Math.min(40,threeD.cam.radius*(pdst/d))); pdst=d; if(pt)clearTimeout(pt); pd=null; } },{passive:false});
}
function ddLoop(now){
  if(!threeD.on){ threeD.raf=null; return; }
  threeD.raf=requestAnimationFrame(ddLoop);
  if(threeD.R!==rows||threeD.C!==cols||!threeD.tiles) ddBuild();
  if(threeD.colorsDirty) ddRecolor();
  if(!dead) threeD.wasDead=false;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++) ddApply(r,c);
  for(let i=threeD.effects.length-1;i>=0;i--){ const tw=threeD.effects[i]; const p=Math.min(1,(now-tw.t0)/tw.dur); if(p<0)continue; tw.onUpdate(tw.ease(p)); if(p>=1){ if(tw.onDone)tw.onDone(); threeD.effects.splice(i,1);} }
  for(const g of threeD.flagSway){ if(g.userData&&g.userData.flag) g.userData.flag.rotation.y=Math.sin(now*0.003+g.position.x*1.7)*0.35; }
  if(threeD.autoRotate&&!started) threeD.cam.theta+=0.0015;
  ddCamera();
  if($('view-play').classList.contains('active')) threeD.renderer.render(threeD.scene,threeD.camera);
}
function ddSetOn(on){
  threeD.on=on; LS.set('boomsweep_3d',on);
  ddBtn.classList.toggle('on',on); ddBtn.textContent= on?'🧊 3D ✓':'🧊 3D';
  const shell=document.querySelector('.board-shell'), zb=document.querySelector('.zoombar');
  if(on){ if(!window.THREE){ showToast('3D unavailable (no WebGL)'); threeD.on=false; ddBtn.classList.remove('on'); ddBtn.textContent='🧊 3D'; return; }
    if(!threeD.ready) init3D(); dd3.style.display='block'; shell.style.display='none'; if(zb) zb.style.display='none';
    ddResize(); if(threeD.R!==rows||threeD.C!==cols||!threeD.tiles) ddBuild();
    if(threeD.tiles) for(const row of threeD.tiles) for(const t of row) t.sig='';
    if(!threeD.raf) threeD.raf=requestAnimationFrame(ddLoop);
  } else { dd3.style.display='none'; shell.style.display=''; if(zb) zb.style.display=''; }
}
ddBtn.addEventListener('click',()=>ddSetOn(!threeD.on));
// refresh 3D colors when the theme changes
const _origApplyTheme=applyTheme;
applyTheme=function(){ _origApplyTheme(); threeD.colorsDirty=true; };

/* ============ Boot ============ */
applyTheme();
soundBtn.textContent=soundOn?'🔊 Sound':'🔇 Muted';
init(); renderStats(); renderAwards();
if(LS.get('boomsweep_3d',false)) ddSetOn(true);
